<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>VIP 系統管理後台 - 修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .active-card { @apply border-rose-500 bg-slate-700 shadow-rose-900/40 ring-1 ring-rose-500; }
        body { background-color: #0f172a; overflow: hidden; }
    </style>
</head>
<body class="text-slate-200 min-h-screen font-sans">

 <div id="login-section" class="flex items-center justify-center min-h-screen w-full bg-slate-950">
    <div class="bg-slate-800 p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-10">
            <div class="inline-block bg-rose-600 p-4 rounded-2xl mb-4 shadow-lg">
                <i class="fas fa-lock text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tighter">ADMIN LOGIN</h1>
            <p class="text-slate-500 text-[10px] mt-2 tracking-widest uppercase">請輸入 ADMIN / 123456</p>
        </div>
        
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">帳號</label>
                <input type="text" name="username" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-rose-500 outline-none" placeholder="ADMIN" required>
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">密碼</label>
                <input type="password" name="password" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-rose-500 outline-none" placeholder="******" required>
            </div>
            
            <button type="submit" class="w-full bg-rose-600 hover:bg-rose-500 text-white font-black py-4 rounded-xl shadow-lg transition-all active:scale-95">
                立即登入
            </button>
        </form>

        {% if error %}
        <p class="text-rose-500 text-center text-xs font-bold mt-2 animate-bounce">❌ {{ error }}</p>
        {% endif %}
    </div>
</div>

    <div id="main-admin" class="hidden h-screen flex flex-col">
        <nav class="bg-slate-800 border-b border-slate-700 px-8 py-4 flex justify-between items-center shadow-xl">
            <div class="flex items-center gap-4">
                <div class="bg-rose-600 p-2 rounded-lg text-white"><i class="fas fa-shield-alt"></i></div>
                <h1 class="text-lg font-black tracking-tighter uppercase">VIP Control Panel</h1>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="showSection('user-mgmt')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-rose-400">
                    <i class="fas fa-users-cog text-xl"></i>
                    <span class="text-[9px] font-bold">帳號管理</span>
                </button>
                <button onclick="location.reload()" class="text-xs font-bold text-rose-500 hover:underline tracking-widest">LOGOUT</button>
            </div>
        </nav>

        <div class="flex-1 grid grid-cols-12 overflow-hidden">
            <div class="col-span-4 border-r border-slate-800 bg-slate-800/30 overflow-y-auto p-5 space-y-4" id="list-container">
                </div>
            <div class="col-span-8 p-10 overflow-y-auto bg-slate-900" id="detail-view">
                <div class="h-full flex flex-col items-center justify-center text-slate-600 italic">
                    <i class="fas fa-mouse-pointer text-5xl mb-4 opacity-20"></i>
                    <p>請點擊左側申請單進行審核</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 登入檢查函數
        function checkLogin() {
            const u = document.getElementById('user_input').value;
            const p = document.getElementById('pass_input').value;

            // 嚴格比對 ADMIN (大寫)
            if (u === 'ADMIN' && p === 'ADMIN') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-admin').style.display = 'flex';
                renderList(); // 登入成功後讀取列表
            } else {
                document.getElementById('error_tip').classList.remove('hidden');
                setTimeout(() => { document.getElementById('error_tip').classList.add('hidden'); }, 2000);
            }
        }

        // 2. 模擬數據
        const mockRequests = [
            { id: 'REQ-0330-01', name: '王小明', dept: '研發部', floor: '5F', ports: [80, 443], suggested_ip: '192.168.50.101', start_ext_port: 10001, time: '10 分鐘前' },
            { id: 'REQ-0329-03', name: '郭董', dept: '董事會', floor: '6F', ports: [443, 5000, 8000], suggested_ip: '192.168.60.88', start_ext_port: 10007, time: '昨天 09:00' }
        ];

        // 3. 渲染左側列表
        function renderList() {
            const container = document.getElementById('list-container');
            container.innerHTML = `<h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">待處理申請</h2>` + 
                mockRequests.map(req => `
                <div onclick="selectRequest('${req.id}')" id="card-${req.id}" class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700/50 cursor-pointer hover:bg-slate-700 transition">
                    <div class="flex justify-between mb-1"><span class="text-[10px] font-mono text-rose-500 font-bold">${req.id}</span></div>
                    <div class="font-bold text-slate-100 text-lg">${req.name}</div>
                    <div class="text-[10px] mt-1 text-slate-500 font-bold uppercase">${req.dept} | ${req.floor}</div>
                </div>
            `).join('');
        }

        // 4. 顯示右側詳情 (細項化映射)
        function selectRequest(id) {
            document.querySelectorAll('[id^="card-"]').forEach(el => el.classList.remove('active-card'));
            const card = document.getElementById(`card-${id}`);
            if(card) card.classList.add('active-card');

            const req = mockRequests.find(r => r.id === id);
            const mappingRows = req.ports.map((p, i) => `
                <div class="flex items-center justify-between bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <div><p class="text-[9px] text-slate-500 font-bold uppercase">內部服務</p><p class="font-mono font-bold text-slate-300">TCP ${p}</p></div>
                    <i class="fas fa-long-arrow-alt-right text-rose-500 opacity-40 text-xl"></i>
                    <div class="text-right"><p class="text-[9px] text-blue-500 font-bold uppercase">自動分配外部</p><p class="font-mono font-black text-blue-400 text-lg">PORT ${req.start_ext_port + i}</p></div>
                </div>
            `).join('');

            document.getElementById('detail-view').innerHTML = `
                <div class="animate-in fade-in duration-300">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-3xl font-black text-white tracking-tighter">審核詳情</h2>
                        <span class="text-xs font-mono text-slate-500 italic">Target IP: <b class="text-green-400 ml-1">${req.suggested_ip}</b></span>
                    </div>
                    <div class="space-y-4 mb-10">${mappingRows}</div>
                    <button onclick="approve('${req.id}')" class="w-full bg-rose-600 hover:bg-rose-500 text-white font-black py-4 rounded-xl shadow-xl transition-all active:scale-95">
                        核准並同步到 FortiGate
                    </button>
                </div>
            `;
        }

        function showSection(type) {
            if(type === 'user-mgmt') {
                document.getElementById('detail-view').innerHTML = `
                    <div class="max-w-md mx-auto bg-slate-800 p-8 rounded-3xl border border-slate-700 mt-10 shadow-2xl animate-in zoom-in duration-300">
                        <h3 class="text-xl font-black text-white mb-6 tracking-widest text-center uppercase italic">新增管理員</h3>
                        <div class="space-y-4 text-sm">
                            <input type="text" placeholder="管理員帳號" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-1 focus:ring-rose-500">
                            <input type="password" placeholder="密碼" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-1 focus:ring-rose-500">
                            <button class="w-full bg-slate-700 text-white font-bold py-3 rounded-xl hover:bg-slate-600 transition">建立帳號</button>
                        </div>
                    </div>
                `;
            }
        }

        function approve(id) {
            alert(`已成功核准單號 ${id}，資料已同步至 FortiGate API！`);
            mockRequests.splice(mockRequests.findIndex(r => r.id === id), 1);
            renderList();
            document.getElementById('detail-view').innerHTML = '<div class="h-full flex items-center justify-center opacity-20 text-5xl font-black italic">SUCCESS</div>';
        }
    </script>
</body>
</html>
