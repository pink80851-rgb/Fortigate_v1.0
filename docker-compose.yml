version: '3.8'

services:
  flask_app:
    build: .
    container_name: fortigate_web
    restart: always
    volumes:
      - ./storage:/app/storage    # 持久化儲存資料
      - ./instance:/app/instance  # 儲存資料庫或設定檔
      - ./.env:/app/.env         # 讀取環境變數
    environment:
      - FLASK_ENV=production

  nginx:
    image: nginx:latest
    container_name: fortigate_nginx
    ports:
      - "80:80"  # 外部存取埠
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask_app
    restart: always